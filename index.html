const { useState, useRef, useEffect, useCallback } = React;

/* ---------- Material palette: linen, ink, brass, umber ---------- */
const INK = "#211D18";
const INK_SOFT = "#4A4239";
const PAPER = "#F4EFE4";
const PAPER_DEEP = "#EAE2CF";
const STONE = "#8C8375";
const BRASS = "#A2823F";
const BRASS_LIGHT = "#C7A25E";
const UMBER = "#2B1F16";
const UMBER_SOFT = "#3E2E20";
const CREAM = "#FAF6EC";
const LINE = "#D9CFB7";
const LINE_DARK = "#54463555";

const SERIF = "'Fraunces', Georgia, serif";
const SANS = "'Inter', 'Segoe UI', sans-serif";

/* every photo runs through the same treatment so mismatched phone shots read as one edit */
const PHOTO_FILTER = "sepia(10%) saturate(78%) contrast(1.07) brightness(0.96)";

/* ---------- utility: scroll reveal ---------- */
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) { setVisible(true); return; }
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}
function Reveal({ children, delay = 0 }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(22px)", transition: `opacity 0.8s ease ${delay}ms, transform 0.8s ease ${delay}ms` }}>
      {children}
    </div>
  );
}

/* ---------- numeral rule: section marker ---------- */
function Marker({ n, title, kicker }) {
  return (
    <div style={{ display: "flex", alignItems: "baseline", gap: 16, marginBottom: 18 }}>
      <span style={{ fontFamily: SERIF, fontStyle: "italic", fontSize: 15, color: BRASS, minWidth: 26 }}>{n}</span>
      <div style={{ flex: 1 }}>
        {kicker && <div style={{ fontFamily: SANS, fontSize: 10.5, color: STONE, letterSpacing: "0.22em", textTransform: "uppercase", marginBottom: 5 }}>{kicker}</div>}
        <h2 style={{ fontFamily: SERIF, fontSize: 25, fontWeight: 600, color: INK, margin: 0, letterSpacing: "-0.01em" }}>{title}</h2>
      </div>
    </div>
  );
}

/* ---------- copy-on-tap value (replaces button-pill copy) ---------- */
function CopyValue({ value, label }) {
  const [copied, setCopied] = useState(false);
  const handle = async () => {
    try { await navigator.clipboard.writeText(value); } catch {}
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  };
  return (
    <button onClick={handle} style={{
      background: "none", border: "none", padding: 0, cursor: "pointer", textAlign: "left", display: "block", width: "100%",
    }}>
      <div style={{ fontFamily: SANS, fontSize: 10.5, color: STONE, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 5 }}>{label}</div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
        <span style={{
          fontFamily: SERIF, fontSize: 22, color: INK, borderBottom: `1px dotted ${BRASS}`, paddingBottom: 2,
        }}>{value}</span>
        <span style={{ fontFamily: SANS, fontSize: 10.5, color: copied ? "#5C7A5A" : BRASS, letterSpacing: "0.08em", textTransform: "uppercase" }}>
          {copied ? "Copied" : "Tap to copy"}
        </span>
      </div>
    </button>
  );
}

/* ---------- Your Space: horizontal editorial photo-essay ---------- */
function SpaceCarousel({ items }) {
  const scrollRef = useRef(null);
  const [active, setActive] = useState(0);

  const handleScroll = useCallback(() => {
    const el = scrollRef.current;
    if (!el) return;
    const first = el.children[0];
    if (!first) return;
    const cardWidth = first.offsetWidth + 14;
    const idx = Math.round(el.scrollLeft / cardWidth);
    setActive(Math.max(0, Math.min(items.length - 1, idx)));
  }, [items.length]);

  return (
    <div>
      <div
        ref={scrollRef}
        onScroll={handleScroll}
        className="niza-hscroll"
        style={{ display: "flex", gap: 14, overflowX: "auto", scrollSnapType: "x mandatory", padding: "0 20px 4px", WebkitOverflowScrolling: "touch" }}
      >
        {items.map((it, i) => (
          <div key={i} style={{ flex: "0 0 80%", maxWidth: 300, scrollSnapAlign: "start", position: "relative", height: 340, overflow: "hidden" }}>
            <img src={it.image} alt={it.title} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", filter: PHOTO_FILTER }} />
            <div style={{ position: "absolute", inset: 0, background: `linear-gradient(180deg, rgba(30,20,12,0) 0%, rgba(30,20,12,0.06) 45%, rgba(30,20,12,0.55) 68%, rgba(30,20,12,0.88) 88%, rgba(30,20,12,0.94) 100%)` }} />
            <div style={{ position: "absolute", top: 14, left: 18, fontFamily: SERIF, fontStyle: "italic", fontSize: 13, color: "#FFFFFF", textShadow: "0 1px 6px rgba(0,0,0,0.5)" }}>
              {String(i + 1).padStart(2, "0")} / {String(items.length).padStart(2, "0")}
            </div>
            {/* fixed-height caption zone, identical position on every card, transparent so the photo shows through */}
            <div style={{ position: "absolute", left: 0, right: 0, bottom: 0, height: 152, padding: "18px 22px" }}>
              <div style={{ fontFamily: SANS, fontSize: 10, color: BRASS_LIGHT, fontWeight: 600, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 8, textShadow: "0 1px 4px rgba(0,0,0,0.6)" }}>
                {it.eyebrow}
              </div>
              <div style={{ fontFamily: SERIF, fontSize: 20, fontWeight: 600, color: "#FFFFFF", marginBottom: it.location || it.details?.length ? 6 : 0, lineHeight: 1.18, textShadow: "0 2px 8px rgba(0,0,0,0.6)" }}>
                {it.title}
              </div>
              {it.location && (
                <div style={{ fontFamily: SANS, fontSize: 11, color: BRASS_LIGHT, letterSpacing: "0.02em", marginBottom: 6, textShadow: "0 1px 4px rgba(0,0,0,0.6)" }}>
                  {it.location}
                </div>
              )}
              <div style={{ fontFamily: SANS, fontSize: 12, color: "#EFE6D4", lineHeight: 1.45, textShadow: "0 1px 4px rgba(0,0,0,0.6)" }}>
                {it.details.map((d, j) => <div key={j} style={{ marginBottom: j < it.details.length - 1 ? 2 : 0 }}>{d}</div>)}
              </div>
            </div>
          </div>
        ))}
      </div>
      {/* progress line instead of dots */}
      <div style={{ margin: "18px 20px 0", height: 1, background: LINE, position: "relative" }}>
        <div style={{ position: "absolute", top: 0, left: 0, height: 1, background: BRASS, width: `${((active + 1) / items.length) * 100}%`, transition: "width 0.3s ease" }} />
      </div>
      <div style={{ margin: "8px 20px 0", fontFamily: SANS, fontSize: 10.5, color: STONE, letterSpacing: "0.12em" }}>
        {String(active + 1).padStart(2, "0")} / {String(items.length).padStart(2, "0")}
      </div>
    </div>
  );
}

/* ---------- Section wrapper with numbered ref for index nav ---------- */
function Section({ id, refs, n, kicker, title, children, dark }) {
  return (
    <div ref={el => refs.current[id] = el} style={{ scrollMarginTop: 64, padding: dark ? "48px 24px" : "42px 24px", background: dark ? UMBER : "transparent" }}>
      <Reveal>
        <div style={{ maxWidth: 560, margin: "0 auto" }}>
          {title && <Marker n={n} title={title} kicker={kicker} />}
          {children}
        </div>
      </Reveal>
    </div>
  );
}

/* ---------- collapsible variant: tap the numeral row to open/close ---------- */
function CollapsibleSection({ id, refs, n, kicker, title, children, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const contentRef = useRef(null);
  const [height, setHeight] = useState(defaultOpen ? "auto" : "0px");

  useEffect(() => {
    if (open && contentRef.current) {
      setHeight(contentRef.current.scrollHeight + "px");
      const t = setTimeout(() => setHeight("auto"), 380);
      return () => clearTimeout(t);
    } else if (contentRef.current) {
      setHeight(contentRef.current.scrollHeight + "px");
      requestAnimationFrame(() => setHeight("0px"));
    }
  }, [open]);

  return (
    <div ref={el => refs.current[id] = el} style={{ scrollMarginTop: 64, padding: "42px 24px", borderTop: `1px solid ${LINE}` }}>
      <div style={{ maxWidth: 560, margin: "0 auto" }}>
        <button
          onClick={() => setOpen(o => !o)}
          style={{ width: "100%", background: "none", border: "none", padding: 0, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "baseline", gap: 16, marginBottom: open ? 18 : 0 }}
        >
          <span style={{ fontFamily: SERIF, fontStyle: "italic", fontSize: 15, color: BRASS, minWidth: 26 }}>{n}</span>
          <div style={{ flex: 1 }}>
            {kicker && <div style={{ fontFamily: SANS, fontSize: 10.5, color: STONE, letterSpacing: "0.22em", textTransform: "uppercase", marginBottom: 5 }}>{kicker}</div>}
            <h2 style={{ fontFamily: SERIF, fontSize: 25, fontWeight: 600, color: INK, margin: 0, letterSpacing: "-0.01em" }}>{title}</h2>
          </div>
          <span style={{
            fontFamily: SERIF, fontStyle: "italic", fontSize: 26, color: BRASS, lineHeight: 1,
            transform: open ? "rotate(45deg)" : "rotate(0deg)", transition: "transform 0.3s ease", flexShrink: 0,
          }}>+</span>
        </button>
        <div style={{ overflow: "hidden", height, transition: "height 0.38s cubic-bezier(0.4,0,0.2,1)" }}>
          <div ref={contentRef}>
            {children}
          </div>
        </div>
      </div>
    </div>
  );
}
